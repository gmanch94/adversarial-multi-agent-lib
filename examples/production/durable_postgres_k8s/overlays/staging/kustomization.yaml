apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: adv-multi-agent

resources:
  - ../../base
  - alertmanager-config.yaml

# D-K8S-2 staging posture:
#   - 2 replicas
#   - PVC postgres (base default)
#   - NetworkPolicy default-deny enforced (base default)
#   - AlertManager wired to logs sink (configmap)
patches:
  - path: patches/daemon-replicas.yaml
  - path: patches/pdb-min-available.yaml
