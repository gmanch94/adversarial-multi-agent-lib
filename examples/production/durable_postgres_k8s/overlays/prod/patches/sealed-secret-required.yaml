# prod overlay: blank out the base plain Secret. The SealedSecret component
# materializes the real Secret named `durable-daemon-secrets` via the
# bitnami sealed-secrets controller. If the SealedSecret manifest is missing
# the controller never reconciles, daemon pods stay Pending, and the operator
# is signalled by readiness probes failing on missing secret mount.
#
# D-K8S-2: prod REFUSES plain Secret. Render-time mechanism = $patch: delete
# replaces the base plain Secret with a SealedSecret-sourced one.
$patch: delete
apiVersion: v1
kind: Secret
metadata:
  name: durable-daemon-secrets
