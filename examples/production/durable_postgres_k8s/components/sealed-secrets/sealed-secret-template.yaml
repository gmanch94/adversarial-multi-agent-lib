# PLACEHOLDER SealedSecret. Operator MUST replace before prod apply.
# Generate via:
#   kubectl create secret generic durable-daemon-secrets \
#     --from-literal=postgres_password="$PG_PW" \
#     --from-literal=fernet_key="$FERNET_KEY" \
#     --namespace=adv-multi-agent --dry-run=client -o yaml \
#     | kubeseal --controller-namespace=sealed-secrets --format yaml \
#     > components/sealed-secrets/sealed-secret-template.yaml
#
# Requires bitnami-labs/sealed-secrets controller installed in-cluster.
# See: https://github.com/bitnami-labs/sealed-secrets
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: durable-daemon-secrets
  namespace: adv-multi-agent
spec:
  encryptedData:
    postgres_password: REPLACE_WITH_SEALED_BASE64_BLOB
    fernet_key: REPLACE_WITH_SEALED_BASE64_BLOB
  template:
    metadata:
      name: durable-daemon-secrets
      namespace: adv-multi-agent
    type: Opaque
