apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# D-K8S-2 prod requirement. Operator MUST replace sealed-secret-template.yaml
# with a real SealedSecret produced via:
#   kubeseal --controller-namespace=sealed-secrets --format yaml < secret.yaml
# Plain Secret references in prod are blocked via overlays/prod/patches/sealed-secret-required.yaml.
resources:
  - sealed-secret-template.yaml
