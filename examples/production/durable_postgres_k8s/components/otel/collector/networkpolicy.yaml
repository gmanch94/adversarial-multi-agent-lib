apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  policyTypes: [Ingress, Egress]
  ingress:
    # Daemon pushes OTLP
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: durable-daemon
      ports:
        - protocol: TCP
          port: 4317
    # Prometheus scrapes metrics
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8889
  egress:
    # Jaeger
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jaeger
      ports:
        - protocol: TCP
          port: 4317
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
