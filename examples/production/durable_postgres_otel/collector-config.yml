# OpenTelemetry Collector config — receivers, processors, exporters, pipelines.
# Trust boundary: collector accepts OTLP gRPC on the internal docker network
# only (no host port binding). Daemon is the sole producer.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        # Operator note: production deployments should enable TLS + mTLS here.
        # Local compose runs on the internal-only docker network so plaintext
        # is acceptable for the reference deploy.

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  # memory_limiter prevents OOM on collector if downstream backs up.
  # Tuned per Slice C: 512 MiB / 128 MiB headroom for production-scale fan-in
  # (default 256/64 was conservative POC sizing).
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  # Tags all exported signals with deployment.environment for multi-env Grafana
  # filtering. DEPLOYMENT_ENV must be set in the daemon .env (dev, staging, prod).
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENV}
        action: upsert

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    # const_labels can leak across tenants; we keep this empty by design.

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus]
  telemetry:
    logs:
      level: info
