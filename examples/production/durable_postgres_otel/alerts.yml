# Prometheus alert rules — durable workflow surface.
# Per-alert runbook entries: docs/runbooks/otel-operations.md section 2.
# Edit thresholds to match your SLO targets (see docs/runbooks/durable-operations.md section 1).
groups:
  - name: durable-workflow
    interval: 30s
    rules:
      - alert: DurableHighRoundLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(durable_round_latency_seconds_bucket[5m]))) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: p95 round latency above 30s for 10m
          runbook: docs/runbooks/otel-operations.md#durablehighroundlatency
      - alert: DurableCipherDecryptFailureSpike
        expr: rate(durable_cipher_decrypt_failed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Cipher decrypt failure rate above 0.1 per second
          runbook: docs/runbooks/otel-operations.md#durableciperdecryptfailurespike
      - alert: DurablePauseResumeImbalance
        expr: (rate(durable_workflow_pause_total[1h]) - rate(durable_workflow_start_total[1h])) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Pauses outpacing starts; paused runs accumulating
          runbook: docs/runbooks/otel-operations.md#durablepauseresumeimbalance
      - alert: DurableLockPoolNearSaturation
        expr: durable_lock_pool_saturation > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Lock pool above 85 percent saturation
          runbook: docs/runbooks/otel-operations.md#durablelockpoolnearsaturation
      # Tier 2.4: dead-letter / quarantine surface. Threshold + duration are
      # tunable per fleet; default trips at >10 active for 15m. The gauge is
      # exported by the sibling daemon's quarantine sampler (quarantine.py
      # QuarantineSync.quarantine_size()).
      - alert: DurableQuarantineGrowing
        expr: durable_quarantine_size > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Quarantine size above 10 active runs for 15m
          runbook: docs/runbooks/otel-operations.md#durablequarantinegrowing
      # A14-H-02: durable_quarantine_size is a GAUGE; increase()/rate() are
      # for counters. Use gauge-delta to detect a real net rise even when
      # requeues are draining the set in parallel.
      - alert: DurableQuarantineSpike
        expr: (durable_quarantine_size - (durable_quarantine_size offset 10m)) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Quarantine grew by >5 net rows in 10m (poison-input storm)
          runbook: docs/runbooks/otel-operations.md#durablequarantinespike
