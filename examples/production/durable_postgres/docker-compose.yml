# Reference deployment. Hardened per spec §5.2.
# - internal network for DB; scheduler reachable only via egress for HTTPS
# - no host ports for scheduler; healthcheck via docker exec
# - read-only rootfs, all caps dropped, no-new-privileges, no core dumps
# - adminer gated behind profiles: [debug]; localhost-bound only

networks:
  internal:
    internal: true
  egress:
    internal: false

services:
  postgres:
    image: postgres:16-alpine
    networks: [internal]
    environment:
      POSTGRES_DB: durable
      POSTGRES_USER: daemon
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "daemon", "-d", "durable"]
      interval: 5s
      timeout: 5s
      retries: 12

  scheduler:
    build:
      context: ../../..
      dockerfile: examples/production/durable_postgres/Dockerfile
    networks: [internal, egress]
    env_file: .env
    # A8-H-01: no POSTGRES_DSN override here.  compose environment: blocks
    # override env_file: values, so a bare "postgresql://daemon@postgres:5432/durable"
    # without a password silently discards the operator's password from .env.
    # The operator MUST set POSTGRES_DSN in .env to include the password AND
    # use "postgres" as the hostname (docker-compose internal service name):
    #   POSTGRES_DSN=postgresql://daemon:<password>@postgres:5432/durable
    # where <password> matches the content of .secrets/postgres_password.
    # See .env.example for the exact template line.
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    security_opt:
      - no-new-privileges:true
    ulimits:
      core: 0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6

  adminer:
    image: adminer:latest
    profiles: [debug]
    networks: [internal]
    ports:
      - "127.0.0.1:8081:8080"   # localhost-only

volumes:
  postgres_data:

secrets:
  postgres_password:
    file: ./.secrets/postgres_password
